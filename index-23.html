.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.toast.info{border:1px solid #F0A500;color:#F0A500}

.live-dot{width:8px;height:8px;background:#ef4444;border-radius:50%;animation:pulse 1s infinite}

.bubble-them{background:#252525;border-radius:12px 12px 12px 2px;padding:7px 11px;max-width:68%;position:relative}

.pg{max-width:840px;margin:0 auto;padding:22px}

function GalleryPage({isAdmin,memberSession,showToast,pc,setMemberLoginOpen}){
  const [photos,setPhotos]=useState([]);
  const [pending,setPending]=useState([]);
  const [view,setView]=useState(null);
  const [loading,setLoading]=useState(true);
  const ref=useRef();const pendRef=useRef();
  useEffect(()=>{
    const db=getDB();if(!db){setLoading(false);return;}
    db.ref("agms_gallery").on("value",snap=>{
      const val=snap.val()||{};
      const arr=Object.entries(val).map(([k,v])=>({...v,_key:k}));
      setPhotos(arr.filter(x=>x.status==="approved").sort((a,b)=>(b.ts||0)-(a.ts||0)));
      setPending(arr.filter(x=>x.status==="pending"));
      setLoading(false);
    });
    return()=>getDB()&&getDB().ref("agms_gallery").off();
  },[]);
  const compress=(file,cb)=>{
    const r=new FileReader();
    r.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const MAX=900;let w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        canvas.width=w;canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        cb(canvas.toDataURL("image/jpeg",0.75));
      };
      img.src=ev.target.result;
    };
    r.readAsDataURL(file);
  };
  const upload=(e,pending)=>{
    Array.from(e.target.files).forEach(file=>{
      compress(file,data=>{
        const db=getDB();if(!db){showToast("Not connected","error");return;}
        db.ref("agms_gallery").push({name:file.name,data,date:new Date().toISOString().split("T")[0],uploader:isAdmin?"Admin":localStorage.getItem("agms_guest_name")||"Guest",status:"approved",ts:Date.now()})
          .then(()=>showToast("Uploaded! ✅","info"))
          .catch(()=>showToast("Upload failed","error"));
      });
    });
    e.target.value="";
  };
  const approve=key=>{const db=getDB();if(db)db.ref("agms_gallery/"+key+"/status").set("approved");};
  const del=key=>{const db=getDB();if(db)db.ref("agms_gallery/"+key).remove().then(()=>showToast("Deleted"));};
  return(
    <div className="pg">
      <div className="flb" style={{marginBottom:16}}>
        <h2 style={{fontFamily:"Oswald",fontSize:24,textTransform:"uppercase"}}>📸 Photo Gallery</h2>
        <div className="fl" style={{gap:7}}>
          {!isAdmin&&<><button className="btn btn-dark btn-sm" onClick={()=>pendRef.current.click()}><Icon name="upload" size={12}/> Add Photo</button><input ref={pendRef} type="file" multiple accept="image/*" style={{display:"none"}} onChange={e=>upload(e,true)}/></>}
          {true&&<><button className="btn btn-sm" style={{background:isAdmin?pc:"#2a2a2a",color:"white",border:"none"}} onClick={()=>ref.current.click()}><Icon name="upload" size={12}/> Upload</button><input ref={ref} type="file" multiple accept="image/*" style={{display:"none"}} onChange={e=>upload(e,false)}/></>}
        </div>
      </div>
      {isAdmin&&pending.length>0&&(
        <div style={{background:"rgba(240,165,0,.08)",border:"1px solid rgba(240,165,0,.2)",borderRadius:10,padding:14,marginBottom:18}}>
          <div style={{fontFamily:"Oswald",fontSize:12,color:"#F0A500",textTransform:"uppercase",marginBottom:10}}>⏳ Pending ({pending.length})</div>
          <div className="mg">
            {pending.map(ph=>(
              <div key={ph._key} className="mi">
                <img src={ph.data} alt={ph.name}/>
                <div className="ml">{ph.uploader}</div>
                <div style={{position:"absolute",top:3,right:3,display:"flex",gap:3}}>
                  <button style={{background:"#22c55e",border:"none",borderRadius:3,padding:"2px 6px",cursor:"pointer",fontSize:11,color:"white"}} onClick={()=>approve(ph._key)}>✓</button>
                  <button style={{background:"#ef4444",border:"none",borderRadius:3,padding:"2px 6px",cursor:"pointer",fontSize:11,color:"white"}} onClick={()=>del(ph._key)}>✕</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
      {loading&&<div style={{textAlign:"center",color:"#555",padding:40}}>Loading gallery...</div>}
      {!loading&&photos.length===0&&<div className="uzone"><Icon name="photo" size={32} color="#555"/><div style={{color:"#555",marginTop:9}}>No photos yet</div></div>}
      <div className="mg">
        {photos.map(ph=>(
          <div key={ph._key} className="mi" onClick={()=>setView(ph)}>
            <img src={ph.data} alt={ph.name}/>
            <div className="ml">{ph.name}</div>
            {isAdmin&&<button style={{position:"absolute",top:3,right:3,background:"rgba(200,16,46,.9)",border:"none",borderRadius:3,padding:"2px 4px",cursor:"pointer"}} onClick={e=>{e.stopPropagation();del(ph._key);}}><Icon name="trash" size={10} color="white"/></button>}
          </div>
        ))}
      </div>
      {view&&<div className="modal-bg" onClick={()=>setView(null)}><div style={{maxWidth:"90vw",position:"relative"}} onClick={e=>e.stopPropagation()}><img src={view.data} alt={view.name} style={{maxWidth:"100%",maxHeight:"84vh",borderRadius:8}}/><div style={{textAlign:"center",color:"#aaa",marginTop:7,fontSize:11}}>{view.name} · {view.uploader}</div><button onClick={()=>setView(null)} style={{position:"absolute",top:-9,right:-9,background:pc,border:"none",borderRadius:"50%",width:24,height:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="close" size={12} color="white"/></button></div></div>}
    </div>
  );
}
function VideosPage({isAdmin,memberSession,showToast,pc,setMemberLoginOpen}){
  const [videos,setVideos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [ytOpen,setYtOpen]=useState(false);
  const [yt,setYt]=useState("");const [ytTitle,setYtTitle]=useState("");

      const val=snap.val()||{};
      const arr=Object.entries(val).map(([k,v])=>({...v,_key:k})).sort((a,b)=>(b.ts||0)-(a.ts||0));
      setVideos(arr);setLoading(false);

    return()=>getDB()&&getDB().ref("agms_videos").off();
  },[]);

      const db=getDB();if(!db)return;
      db.ref("agms_videos").push({name:file.name,data:ev.target.result,videoType:"file",date:new Date().toISOString().split("T")[0],uploader:memberSession&&memberSession.name||localStorage.getItem("agms_guest_name")||"Guest",ts:Date.now()})

            <div style={{padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

      {ytOpen&&<div className="modal-bg"><div className="modal"><div className="modal-hd"><h3 style={{fontFamily:"Oswald"}}>Add YouTube Video</h3><button style={{background:"none",border:"none",cursor:"pointer"}} onClick={()=>setYtOpen(false)}><Icon name="close" size={16} color="#888"/></button></div><div className="modal-bd" style={{display:"flex",flexDirection:"column",gap:12}}><div><label style={{fontSize:10,color:"#888",display:"block",marginBottom:4}}>TITLE</label><input className="input" placeholder="Video title..." value={ytTitle} onChange={e=>setYtTitle(e.target.value)}/></div><div><label style={{fontSize:10,color:"#888",display:"block",marginBottom:4}}>YOUTUBE URL</label><input className="input" placeholder="https://www.youtube.com/watch?v=..." value={yt} onChange={e=>setYt(e.target.value)}/></div></div><div className="modal-ft"><button className="btn btn-dark btn-sm" onClick={()=>setYtOpen(false)}>Cancel</button><button className="btn btn-sm" style={{background:pc,color:"white",border:"none"}} onClick={addYt}>Add</button></div></div></div>}

    const db=getDB();if(!db){setLoading(false);return;}

      const val=snap.val()||{};
      const arr=Object.entries(val).map(([k,v])=>({...v,_key:k})).sort((a,b)=>(b.ts||0)-(a.ts||0));
      setDocs(arr);setLoading(false);
    });
    return()=>getDB()&&getDB().ref("agms_documents").off();
  },[]);
  const upload=e=>Array.from(e.target.files).forEach(file=>{
    // No size limit enforced
    const r=new FileReader();
    r.onload=ev=>{
      const db=getDB();if(!db)return;
      db.ref("agms_documents").push({name:file.name,size:(file.size/1024).toFixed(1)+" KB",data:ev.target.result,date:new Date().toISOString().split("T")[0],ts:Date.now()})
        .then(()=>showToast("Uploaded ✅")).catch(()=>showToast("Upload failed","error"));
    };
    r.readAsDataURL(file);
    e.target.value="";
  });
  const dl=doc=>{const a=document.createElement("a");a.href=doc.data;a.download=doc.name;a.click();};
  const del=key=>{const db=getDB();if(db)db.ref("agms_documents/"+key).remove().then(()=>showToast("Deleted"));};
  const icon=name=>{
    if(!name)return"📄";
    if(name.endsWith(".pdf"))return"📕";
    if(name.endsWith(".doc")||name.endsWith(".docx"))return"📘";
    if(name.endsWith(".xls")||name.endsWith(".xlsx"))return"📗";
    return"📄";

function getFirebaseConfig(){

  }catch{return null}
}
let _db=null;
function getDB(){

const ICE_CFG={iceServers:[
  {urls:"stun:stun.l.google.com:19302"},
  {urls:"stun:stun2.l.google.com:19302"},
  {urls:"turn:openrelay.metered.ca:80",username:"openrelayproject",credential:"openrelayproject"},
  {urls:"turn:openrelay.metered.ca:443",username:"openrelayproject",credential:"openrelayproject"},
  {urls:"turn:openrelay.metered.ca:443?transport=tcp",username:"openrelayproject",credential:"openrelayproject"},
]};
function useCall(dbRef,senderName,senderId){
  const [callState,setCallState]=useState("idle");
  const [callType,setCallType]=useState(null);
  const [callId,setCallId]=useState(null);
  const [callerName,setCallerName]=useState("");
  const [localStream,setLocalStream]=useState(null);
  const [remoteStream,setRemoteStream]=useState(null);
  const [muted,setMuted]=useState(false);
  const [camOff,setCamOff]=useState(false);
  const [secs,setSecs]=useState(0);
  const peer=useRef(null);
  const lv=useRef(null); // local video el
  const rv=useRef(null); // remote video el
  const ls=useRef(null); // local stream ref
  const cid=useRef(null);
  const timer=useRef(null);
  const buf=useRef([]); // ICE buffer
  const rdone=useRef(false);
  const csr=useRef("idle"); // callState ref
  const upCS=s=>{csr.current=s;setCallState(s);};
  useEffect(()=>{
    const tryListen=()=>{
      const db=dbRef.current;
      if(!db){setTimeout(tryListen,1000);return;}
      db.ref("agms_active_call").on("value",snap=>{
        const d=snap.val();
        if(!d)return;
        if(d.callerId===senderId)return;
        if((d.status==="ended"||d.status==="rejected")&&csr.current!=="idle"){cleanup(false);return;}
        if(d.status==="ringing"&&csr.current==="idle"){
          setCallerName(d.callerName);setCallType(d.callType);setCallId(d.callId);upCS("incoming");
        }
      });
    };
    tryListen();
    return()=>{const db=dbRef.current;if(db)db.ref("agms_active_call").off();};
  },[senderId]);
  useEffect(()=>{
    if(callState==="in-call"){timer.current=setInterval(()=>setSecs(s=>s+1),1000);}
    else{clearInterval(timer.current);if(callState==="idle")setSecs(0);}
    return()=>clearInterval(timer.current);
  },[callState]);
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const media=async type=>navigator.mediaDevices.getUserMedia({
    audio:{echoCancellation:true,noiseSuppression:true},
    video:type==="video"?{facingMode:"user",width:{ideal:480},height:{ideal:360}}:false
  });
  const addIce=async(c)=>{
    if(!c)return;
    if(rdone.current&&peer.current){
      try{await peer.current.addIceCandidate(new RTCIceCandidate(c));}catch{}
    }else buf.current.push(c);
  };
  const flushBuf=async()=>{
    for(const c of buf.current){try{await peer.current.addIceCandidate(new RTCIceCandidate(c));}catch{}}
    buf.current=[];
  };
  const makePeer=(stream,init,cId)=>{
    if(peer.current){try{peer.current.close();}catch{}}
    buf.current=[];rdone.current=false;
    const p=new RTCPeerConnection(ICE_CFG);
    peer.current=p;
    stream.getTracks().forEach(t=>p.addTrack(t,stream));
    const rms=new MediaStream();
    p.ontrack=e=>{
      e.streams[0].getTracks().forEach(t=>{if(!rms.getTrackById(t.id))rms.addTrack(t);});
      const snap=new MediaStream(rms.getTracks());
      setRemoteStream(snap);
      if(rv.current){rv.current.srcObject=snap;rv.current.play().catch(()=>{});}
    };
    p.onicecandidate=e=>{
      if(!e.candidate)return;
      const db=dbRef.current;if(!db)return;
      db.ref(`agms_calls/${cId}/${init?"callerC":"calleeC"}`).push(e.candidate.toJSON());
    };
    p.oniceconnectionstatechange=()=>{
      const s=p.iceConnectionState;
      if(s==="connected"||s==="completed")upCS("in-call");
      if(s==="failed")cleanup(true);
    };
    return p;
  };
  const startCall=async type=>{
    const db=dbRef.current;
    if(!db){alert("Not connected to Firebase. Try again.");return;}
    try{
      const stream=await media(type);
      ls.current=stream;setLocalStream(stream);
      if(lv.current){lv.current.srcObject=stream;lv.current.play().catch(()=>{});}
      setCallType(type);
      const cId="c"+Date.now();cid.current=cId;
      upCS("calling");
      const p=makePeer(stream,true,cId);
      db.ref(`agms_calls/${cId}/answer`).on("value",async snap=>{
        const ans=snap.val();
        if(ans&&p.signalingState==="have-local-offer"){
          await p.setRemoteDescription(new RTCSessionDescription(ans));
          rdone.current=true;await flushBuf();
        }
      });
      db.ref(`agms_calls/${cId}/calleeC`).on("child_added",snap=>addIce(snap.val()));
      const offer=await p.createOffer({offerToReceiveAudio:true,offerToReceiveVideo:type==="video"});
      await p.setLocalDescription(offer);
      await db.ref("agms_active_call").set({callId:cId,callerId:senderId,callerName:senderName,callType:type,status:"ringing",ts:Date.now()});
      await db.ref(`agms_calls/${cId}/offer`).set({type:offer.type,sdp:offer.sdp});
    }catch(e){alert("Could not start call.\n"+e.message);cleanup(false);}
  };
  const acceptCall=async()=>{
    const db=dbRef.current;if(!db||!callId)return;
    const cId=callId;cid.current=cId;
    try{
      const stream=await media(callType);
      ls.current=stream;setLocalStream(stream);
      if(lv.current){lv.current.srcObject=stream;lv.current.play().catch(()=>{});}
      upCS("in-call");
      const p=makePeer(stream,false,cId);
      db.ref(`agms_calls/${cId}/callerC`).on("child_added",snap=>addIce(snap.val()));
      const offerSnap=await db.ref(`agms_calls/${cId}/offer`).get();
      const offer=offerSnap.val();if(!offer){cleanup(false);return;}
      await p.setRemoteDescription(new RTCSessionDescription(offer));
      rdone.current=true;await flushBuf();
      const answer=await p.createAnswer();
      await p.setLocalDescription(answer);
      await db.ref(`agms_calls/${cId}/answer`).set({type:answer.type,sdp:answer.sdp});
    }catch(e){alert("Could not join call.\n"+e.message);cleanup(false);}
  };
  const cleanup=notify=>{
    if(peer.current){try{peer.current.close();}catch{}peer.current=null;}
    if(ls.current){ls.current.getTracks().forEach(t=>t.stop());ls.current=null;}
    setLocalStream(null);setRemoteStream(null);
    upCS("idle");setCallType(null);setCallId(null);setCallerName("");
    setMuted(false);setCamOff(false);
    rdone.current=false;buf.current=[];
    if(notify){
      const db=dbRef.current;
      if(db&&cid.current){
        db.ref("agms_active_call").update({status:"ended"});
        db.ref(`agms_calls/${cid.current}`).remove();
      }
    }
    cid.current=null;
  };
  const endCall=()=>cleanup(true);
  const rejectCall=()=>{const db=dbRef.current;if(db)db.ref("agms_active_call").update({status:"rejected"});upCS("idle");setCallId(null);setCallerName("");};
  const toggleMute=()=>{if(ls.current){ls.current.getAudioTracks().forEach(t=>{t.enabled=!t.enabled;});setMuted(m=>!m);}};
  const toggleCam=()=>{if(ls.current){ls.current.getVideoTracks().forEach(t=>{t.enabled=!t.enabled;});setCamOff(c=>!c);}};
  return{callState,callType,callerName,localStream,remoteStream,muted,camOff,secs,fmt,lv,rv,startCall,acceptCall,rejectCall,endCall,toggleMute,toggleCam};
}

function TrafficAnalytics({pc}){

      const msgs=Object.values(val);
      const counts={
        msgs:msgs.length,
        images:msgs.filter(m=>m.type==="image").length,
        voices:msgs.filter(m=>m.type==="audio").length,
        calls:msgs.filter(m=>m.type==="call_log").length,
      };
      const members=safeLoad("agms_members",[]).filter(m=>m.status==="approved").length;

      const newStats={...counts,members,visitors:uniqueSenders.size};

      const existing=JSON.parse(localStorage.getItem("agms_traffic_history")||"[]");

      setLoading(false);

            <button onClick={()=>imgRef.current.click()} style={{background:"#252525",border:"1px solid #333",borderRadius:16,padding:"4px 11px",cursor:"pointer",fontSize:11,color:"#aaa"}}>📷 Photo</button>
            <input ref={imgRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>e.target.files[0]&&compressImg(e.target.files[0],d=>setImg(d))}/>
            {img&&<button onClick={()=>setImg(null)} style={{background:"#252525",border:"1px solid #444",borderRadius:16,padding:"4px 11px",cursor:"pointer",fontSize:11,color:"#ff5555"}}>✕</button>}
          </div>
          <button onClick={post} disabled={posting||(!text.trim()&&!img)} style={{background:pc,color:"white",border:"none",borderRadius:16,padding:"6px 16px",fontFamily:"Oswald",fontSize:11,cursor:"pointer",opacity:posting?0.6:1,letterSpacing:1}}>
            {posting?"...":"POST 🔴"}
          </button>
        </div>
      </div>
      {loading&&<div style={{textAlign:"center",color:"#555",padding:26}}>Loading...</div>}
      {!loading&&posts.length===0&&<div style={{textAlign:"center",color:"#555",padding:36,fontSize:13}}>No posts yet — be first! 🔴</div>}
      {posts.map(p=><CommunityPost key={p._key} post={p} pc={pc} ac={ac} authorId={authorId} authorName={author} isAdmin={isAdmin} onLike={toggleLike} onDel={delPost} showToast={showToast}/>)}
    </div>
  );
}
function CommunityPost({post,pc,ac,authorId,authorName,isAdmin,onLike,onDel,showToast}){
  const [comments,setComments]=useState([]);
  const [open,setOpen]=useState(false);
  const [cmtText,setCmtText]=useState("");
  const [loadingC,setLoadingC]=useState(false);
  const likes=post.likes||[];
  const liked=likes.includes(authorId);
  const fmt=ts=>new Date(ts).toLocaleDateString([],{day:"numeric",month:"short",year:"2-digit",hour:"2-digit",minute:"2-digit"});
  const loadComments=()=>{
    if(open){setOpen(false);return;}
    setOpen(true);setLoadingC(true);
    const db=getDB();if(!db)return;
    db.ref("agms_community/"+post._key+"/comments").on("value",snap=>{
      const val=snap.val()||{};
      const arr=Object.entries(val).map(([k,v])=>({...v,_key:k})).sort((a,b)=>a.ts-b.ts);
      setComments(arr);setLoadingC(false);
    });
  };
  const addComment=()=>{
    if(!cmtText.trim())return;
    const db=getDB();if(!db)return;
    db.ref("agms_community/"+post._key+"/comments").push({authorId,authorName,text:cmtText.trim(),ts:Date.now()})
      .then(()=>{
        setCmtText("");
        db.ref("agms_community/"+post._key+"/commentCount").transaction(n=>(n||0)+1);
      });
  };
  const delComment=key=>{const db=getDB();if(db)db.ref("agms_community/"+post._key+"/comments/"+key).remove();};
  return(
    <div style={{background:"#1A1A1A",border:"1px solid #2a2a2a",borderRadius:12,marginBottom:12,overflow:"hidden"}}>
      <div style={{padding:"11px 14px 7px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:34,height:34,background:post.authorId==="admin"?pc:"#333",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700}}>
            {(post.authorName||"?")[0].toUpperCase()}
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:post.authorId==="admin"?pc:"white"}}>{post.authorName}</div>
            <div style={{fontSize:9,color:"#555"}}>{fmt(post.createdAt)}</div>
          </div>
        </div>
        {(isAdmin||post.authorId===authorId)&&<button style={{background:"none",border:"none",cursor:"pointer",padding:3}} onClick={()=>onDel(post._key)}><Icon name="trash" size={12} color="#444"/></button>}
      </div>
      {post.content&&<div style={{padding:"0 14px 9px",fontSize:13,lineHeight:1.6,color:"#ddd",whiteSpace:"pre-wrap"}}>{post.content}</div>}
      {post.image&&<img src={post.image} alt="" style={{width:"100%",maxHeight:380,objectFit:"cover",display:"block"}}/>}
      <div style={{padding:"7px 14px",borderTop:"1px solid #252525",display:"flex",gap:14}}>
        <button onClick={()=>onLike(post._key,post.likes)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:4,color:liked?pc:"#555",fontSize:12,padding:0}}>
          {liked?"❤️":"🤍"}{likes.length>0&&<span style={{fontSize:11}}>{likes.length}</span>}
        </button>
        <button onClick={loadComments} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:4,color:"#555",fontSize:12,padding:0}}>
          💬 <span style={{fontSize:11}}>{post.commentCount||0}</span>
        </button>
      </div>
      {open&&(
        <div style={{background:"#151515",borderTop:"1px solid #252525",padding:"9px 14px"}}>
          {loadingC&&<div style={{fontSize:11,color:"#555",marginBottom:7}}>Loading...</div>}
          {comments.map(cm=>(
            <div key={cm._key} style={{display:"flex",gap:7,marginBottom:9}}>
              <div style={{width:26,height:26,background:cm.authorId==="admin"?pc:"#333",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0}}>{(cm.authorName||"?")[0].toUpperCase()}</div>
              <div style={{flex:1,background:"#1A1A1A",borderRadius:8,padding:"5px 9px"}}>
                <div style={{fontSize:10,fontWeight:700,color:cm.authorId==="admin"?pc:"#888",marginBottom:2}}>{cm.authorName}</div>
                <div style={{fontSize:12,color:"#ccc"}}>{cm.text}</div>
              </div>
              {(isAdmin||cm.authorId===authorId)&&<button style={{background:"none",border:"none",cursor:"pointer",padding:1,alignSelf:"flex-start",marginTop:4}} onClick={()=>delComment(cm._key)}><Icon name="trash" size={10} color="#333"/></button>}
            </div>
          ))}
          <div style={{display:"flex",gap:6,marginTop:5}}>
            <input value={cmtText} onChange={e=>setCmtText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addComment()} placeholder="Write a comment..." style={{flex:1,background:"#252525",border:"1px solid #333",borderRadius:14,padding:"5px 11px",color:"white",fontSize:12,outline:"none"}}/>
            <button onClick={addComment} style={{background:pc,border:"none",borderRadius:"50%",width:28,height:28,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="send" size={11} color="white"/></button>
          </div>
        </div>
      )}
    </div>
  );
}
function BroadcastPage({memberSession,isAdmin,showToast,pc,ac}){
  const [mode,setMode]=useState("idle"); // idle | broadcaster | viewer
  const [active,setActive]=useState(null);
  const [viewers,setViewers]=useState(0);
  const [title,setTitle]=useState("");
  const [chatMsg,setChatMsg]=useState("");
  const [liveChat,setLiveChat]=useState([]);
  const [guestName,setGuestName]=useState(()=>localStorage.getItem("agms_guest_name")||"");
  const [nameInput,setNameInput]=useState("");
  const [facingMode,setFacingMode]=useState("user");
  const [muted,setMuted]=useState(false);
  const [reactions,setReactions]=useState([]);
  const localVid=useRef(null);
  const remoteVid=useRef(null);
  const dbRef=useRef(null);
  const peersRef=useRef({});
  const streamRef=useRef(null);
  const myId=useRef("u"+Date.now()+Math.random().toString(36).slice(2,7));
  const chatEnd=useRef(null);
  const me=isAdmin?"Admin ⚙":(memberSession&&memberSession.name)||guestName;
  const ok=isAdmin||!!(memberSession&&memberSession.name)||!!guestName;

  useEffect(()=>{
    const db=getDB();if(!db)return;
    dbRef.current=db;
    db.ref("agms_broadcast/active").on("value",snap=>{
      const val=snap.val();
      setActive(val||null);
      // If stream ended and we were watching, go back to idle
      if(!val&&mode==="viewer") setMode("idle");
    });
    db.ref("agms_broadcast/viewers").on("value",snap=>setViewers(Object.keys(snap.val()||{}).length));
    db.ref("agms_broadcast/chat").limitToLast(60).on("value",snap=>{
      const val=snap.val()||{};
      setLiveChat(Object.entries(val).map(([k,v])=>({...v,_key:k})).sort((a,b)=>a.ts-b.ts));
    });
    return()=>{
      const db2=dbRef.current;if(!db2)return;
      db2.ref("agms_broadcast/active").off();
      db2.ref("agms_broadcast/viewers").off();
      db2.ref("agms_broadcast/chat").off();
    };
  },[]);

  useEffect(()=>{chatEnd.current&&chatEnd.current.scrollIntoView({behavior:"smooth"});},[liveChat]);

  // Show self immediately when broadcaster mode starts
  useEffect(()=>{
    if(mode==="broadcaster"&&localVid.current&&streamRef.current){
      localVid.current.srcObject=streamRef.current;
      localVid.current.play().catch(()=>{});
    }
  },[mode]);

  const startBroadcast=async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:720}},audio:{echoCancellation:true,noiseSuppression:true}});
      streamRef.current=stream;
      setMode("broadcaster");
      // Show self immediately via ref — no waiting
      setTimeout(()=>{
        if(localVid.current){localVid.current.srcObject=stream;localVid.current.play().catch(()=>{});}
      },50);
      const db=dbRef.current;if(!db)return;
      await db.ref("agms_broadcast/active").set({id:myId.current,name:me,title:title||"Live from AGMS",startedAt:Date.now()});
      showToast("You are LIVE! 🔴");
      // Handle viewer join requests
      db.ref("agms_broadcast/requests").on("child_added",async snap=>{
        const req=snap.val();if(!req||req.vid===myId.current)return;
        const vid=req.vid;
        const p=new RTCPeerConnection(ICE_CFG);
        peersRef.current[vid]=p;
        stream.getTracks().forEach(t=>p.addTrack(t,stream));
        p.onicecandidate=e=>{if(e.candidate)db.ref("agms_broadcast/signals/"+vid+"/ice_b").push(e.candidate.toJSON());};
        db.ref("agms_broadcast/signals/"+vid+"/ice_v").on("child_added",snap2=>{
          const ic=snap2.val();if(ic&&p.remoteDescription)p.addIceCandidate(new RTCIceCandidate(ic)).catch(()=>{});
        });
        const offer=await p.createOffer();
        await p.setLocalDescription(offer);
        db.ref("agms_broadcast/signals/"+vid+"/offer").set({type:offer.type,sdp:offer.sdp});
        db.ref("agms_broadcast/signals/"+vid+"/answer").on("value",snap2=>{
          const ans=snap2.val();
          if(ans&&!p.remoteDescription)p.setRemoteDescription(new RTCSessionDescription(ans)).catch(()=>{});
        });
      });
    }catch(e){showToast("Camera error: "+e.message,"error");}
  };

  const stopBroadcast=()=>{
    const db=dbRef.current;
    if(db){
      db.ref("agms_broadcast/active").remove();
      db.ref("agms_broadcast/viewers").remove();
      db.ref("agms_broadcast/signals").remove();
      db.ref("agms_broadcast/requests").off();
      db.ref("agms_broadcast/requests").remove();
    }
    Object.values(peersRef.current).forEach(p=>{try{p.close();}catch(e){}});
    peersRef.current={};
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
    if(localVid.current){localVid.current.srcObject=null;}
    setMode("idle");
    showToast("Broadcast ended");
  };

  const flipCamera=async()=>{
    const newFacing=facingMode==="user"?"environment":"user";
    setFacingMode(newFacing);
    if(streamRef.current){
      streamRef.current.getTracks().forEach(t=>t.stop());
      try{
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:newFacing,width:{ideal:720}},audio:{echoCancellation:true}});
        streamRef.current=stream;
        if(localVid.current){localVid.current.srcObject=stream;localVid.current.play().catch(()=>{});}
        // Re-send to all peers
        Object.values(peersRef.current).forEach(p=>{
          const vSender=p.getSenders().find(s=>s.track&&s.track.kind==="video");
          if(vSender)vSender.replaceTrack(stream.getVideoTracks()[0]);
        });
      }catch(e){showToast("Flip failed","error");}
    }
  };

  const toggleMute=()=>{
    if(streamRef.current){
      streamRef.current.getAudioTracks().forEach(t=>{t.enabled=!t.enabled;});
      setMuted(m=>!m);
    }
  };

  const watchBroadcast=async()=>{
    if(!active)return;
    const db=dbRef.current;if(!db)return;
    setMode("viewer");
    db.ref("agms_broadcast/viewers/"+myId.current).set({name:me,ts:Date.now()});
    const p=new RTCPeerConnection(ICE_CFG);
    peersRef.current["main"]=p;
    // Buffer ICE candidates until remote description is set
    const iceBuf=[];let remoteSet=false;
    p.ontrack=e=>{
      if(remoteVid.current&&e.streams&&e.streams[0]){
        remoteVid.current.srcObject=e.streams[0];
        remoteVid.current.play().catch(()=>{});
      }
    };
    p.onicecandidate=e=>{if(e.candidate)db.ref("agms_broadcast/signals/"+myId.current+"/ice_v").push(e.candidate.toJSON());};
    db.ref("agms_broadcast/signals/"+myId.current+"/ice_b").on("child_added",snap=>{
      const ic=snap.val();if(!ic)return;
      if(remoteSet) p.addIceCandidate(new RTCIceCandidate(ic)).catch(()=>{});
      else iceBuf.push(ic);
    });
    db.ref("agms_broadcast/signals/"+myId.current+"/offer").on("value",async snap=>{
      const offer=snap.val();
      if(!offer||p.remoteDescription)return;
      try{
        await p.setRemoteDescription(new RTCSessionDescription(offer));
        remoteSet=true;
        // Drain buffered ICE
        for(const ic of iceBuf) await p.addIceCandidate(new RTCIceCandidate(ic)).catch(()=>{});
        const answer=await p.createAnswer();
        await p.setLocalDescription(answer);
        db.ref("agms_broadcast/signals/"+myId.current+"/answer").set({type:answer.type,sdp:answer.sdp});
      }catch(err){console.error("Watch error:",err);}
    });
    // Send join request AFTER setting up listeners
    db.ref("agms_broadcast/requests/"+myId.current).set({vid:myId.current,name:me,ts:Date.now()});
  };

  const stopWatching=()=>{
    const db=dbRef.current;
    if(db){
      db.ref("agms_broadcast/viewers/"+myId.current).remove();
      db.ref("agms_broadcast/signals/"+myId.current).remove();
    }
    Object.values(peersRef.current).forEach(p=>{try{p.close();}catch(e){}});
    peersRef.current={};
    if(remoteVid.current) remoteVid.current.srcObject=null;
    setMode("idle");
  };

  const sendChat=()=>{
    if(!chatMsg.trim()||!ok)return;
    const db=dbRef.current;if(!db)return;
    db.ref("agms_broadcast/chat").push({name:me,text:chatMsg.trim(),ts:Date.now()});
    setChatMsg("");
  };

  const sendReaction=(icon)=>{
    const db=dbRef.current;if(!db)return;
    db.ref("agms_broadcast/chat").push({name:me,text:icon,ts:Date.now(),isReaction:true});
    const id=Date.now();
    setReactions(r=>[...r,{id,icon,x:Math.random()*70+10}]);
    setTimeout(()=>setReactions(r=>r.filter(x=>x.id!==id)),2000);
  };

  // ── TikTok UI helper ────────────────────────────────────
  const LiveOverlay=({isSelf})=>(
    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",justifyContent:"space-between",padding:0,pointerEvents:"none"}}>
      {/* Top bar */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 14px 0",pointerEvents:"all"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{background:pc,borderRadius:6,padding:"3px 10px",fontFamily:"Oswald",fontSize:11,letterSpacing:2,display:"flex",alignItems:"center",gap:5,color:"white"}}>
            <div style={{width:6,height:6,background:"white",borderRadius:"50%",animation:"pulse .8s infinite"}}/>LIVE
          </div>
          <span style={{fontSize:12,color:"white",background:"rgba(0,0,0,.55)",borderRadius:12,padding:"2px 10px"}}>
            👁 {viewers} {isSelf&&"watching"}
          </span>
          {!isSelf&&active&&<span style={{fontSize:12,color:"white",background:"rgba(0,0,0,.55)",borderRadius:12,padding:"2px 10px"}}>{active.name}</span>}
        </div>
        <button
          onClick={isSelf?stopBroadcast:stopWatching}
          style={{background:isSelf?"#ef4444":"rgba(0,0,0,.6)",border:isSelf?"none":"1px solid rgba(255,255,255,.3)",borderRadius:18,padding:"7px 16px",color:"white",fontFamily:"Oswald",fontSize:12,cursor:"pointer",letterSpacing:1,pointerEvents:"all"}}
        >
          {isSelf?"⏹ END":"✕ Leave"}
        </button>
      </div>

      {/* Floating reactions */}
      <div style={{position:"absolute",right:16,bottom:200,width:40,pointerEvents:"none"}}>
        {reactions.map(r=>(
          <div key={r.id} style={{position:"absolute",bottom:0,right:0,fontSize:26,animation:"floatUp 2s ease forwards",opacity:1}}>
            {r.icon}
          </div>
        ))}
      </div>

      {/* Right side controls (broadcaster) */}
      {isSelf&&(
        <div style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",display:"flex",flexDirection:"column",gap:14,alignItems:"center",pointerEvents:"all"}}>
          <button onClick={flipCamera} style={{width:44,height:44,background:"rgba(0,0,0,.55)",border:"none",borderRadius:"50%",cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>🔄</button>
          <button onClick={toggleMute} style={{width:44,height:44,background:muted?"rgba(239,68,68,.7)":"rgba(0,0,0,.55)",border:"none",borderRadius:"50%",cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>{muted?"🔇":"🎙️"}</button>
        </div>
      )}

      {/* Bottom: chat + reactions */}
      <div style={{pointerEvents:"all"}}>
        {/* Chat overlay */}
        <div style={{maxHeight:160,overflowY:"auto",padding:"0 14px 6px",display:"flex",flexDirection:"column",gap:3}}>
          {liveChat.slice(-14).filter(m=>!m.isReaction).map(m=>(
            <div key={m._key} style={{fontSize:13,color:"white",textShadow:"0 1px 3px rgba(0,0,0,.8)"}}>
              <span style={{fontWeight:700,color:ac}}>{m.name}: </span>{m.text}
            </div>
          ))}
          <div ref={chatEnd}/>
        </div>
        {/* Reaction buttons (viewer) + chat input */}
        <div style={{background:"linear-gradient(transparent,rgba(0,0,0,.7))",padding:"8px 14px 18px"}}>
          {!isSelf&&(
            <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:8}}>
              {["❤️","👏","🔥","😂","⚽"].map(r=>(
                <button key={r} onClick={()=>sendReaction(r)} style={{width:40,height:40,background:"rgba(255,255,255,.15)",border:"none",borderRadius:"50%",cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {r}
                </button>
              ))}
            </div>
          )}
          {ok&&(
            <div style={{display:"flex",gap:7,alignItems:"center"}}>
              <input
                value={chatMsg}
                onChange={e=>setChatMsg(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&sendChat()}
                placeholder="Say something..."
                style={{flex:1,background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.2)",borderRadius:20,padding:"8px 14px",color:"white",fontSize:13,outline:"none"}}
              />
              <button onClick={sendChat} style={{background:pc,border:"none",borderRadius:"50%",width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <Icon name="send" size={14} color="white"/>
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );

  // ── Name gate ────────────────────────────────────────────
  if(!ok) return(
    <div className="pg" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"70vh",flexDirection:"column",gap:14}}>
      <div style={{fontSize:54}}>🔴</div>
      <h2 style={{fontFamily:"Oswald",fontSize:22,textTransform:"uppercase"}}>Go Live or Watch</h2>
      <p style={{color:"#777",fontSize:13,maxWidth:280,textAlign:"center",lineHeight:1.6}}>Enter your name to join the broadcast</p>
      <div style={{width:"100%",maxWidth:300,display:"flex",gap:8}}>
        <input className="input" placeholder="Your name..." value={nameInput} onChange={e=>setNameInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&nameInput.trim()){localStorage.setItem("agms_guest_name",nameInput.trim());setGuestName(nameInput.trim());}}} style={{flex:1}}/>
        <button className="btn btn-red" onClick={()=>{if(nameInput.trim()){localStorage.setItem("agms_guest_name",nameInput.trim());setGuestName(nameInput.trim());}}}>Go</button>
      </div>
    </div>
  );

  // ── Broadcaster live view ────────────────────────────────
  if(mode==="broadcaster") return(
    <div style={{position:"fixed",inset:0,background:"#000",zIndex:500}}>
      <video ref={localVid} autoPlay playsInline muted style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",transform:"scaleX(-1)"}}/>
      <LiveOverlay isSelf={true}/>
    </div>
  );

  // ── Viewer live view ─────────────────────────────────────
  if(mode==="viewer") return(
    <div style={{position:"fixed",inset:0,background:"#000",zIndex:500}}>
      <video ref={remoteVid} autoPlay playsInline style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
      <LiveOverlay isSelf={false}/>
    </div>
  );

  // ── Idle / lobby ─────────────────────────────────────────
  return(
    <div className="pg" style={{paddingTop:24}}>
      {active?(
        <div style={{textAlign:"center",paddingTop:16}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,background:"rgba(200,16,46,.15)",border:"1px solid rgba(200,16,46,.4)",borderRadius:22,padding:"6px 18px",marginBottom:16}}>
            <div style={{width:8,height:8,background:pc,borderRadius:"50%",animation:"pulse .8s infinite"}}/>
            <span style={{fontFamily:"Oswald",fontSize:13,color:pc,letterSpacing:2}}>LIVE NOW</span>
          </div>
          <div style={{fontFamily:"Oswald",fontSize:22,marginBottom:4}}>{active.name}</div>
          <div style={{color:"#888",fontSize:13,marginBottom:4}}>{active.title}</div>
          <div style={{fontSize:12,color:"#666",marginBottom:20}}>👁 {viewers} watching</div>

function PrivateChatButton({pc,ac,memberSession,isAdmin,online,showToast}){
  const [open,setOpen]=useState(false);
  const [peer,setPeer]=useState(null);
  const [msgs,setMsgs]=useState([]);
  const [text,setText]=useState("");
  const [unread,setUnread]=useState(0);
  const endRef=useRef(null);
  const myName=isAdmin?"Admin":(memberSession&&memberSession.name)||null;
  const myId=isAdmin?"admin":(memberSession&&memberSession.id)||null;
  const dmKey=(a,b)=>[a,b].sort().join("__");

  useEffect(()=>{
    if(!peer||!myId){return;}
    const db=getDB();if(!db)return;
    const key=dmKey(myId,peer.id);
    const ref=db.ref("agms_dm/"+key+"/msgs");
    ref.limitToLast(100).on("value",snap=>{
      const val=snap.val()||{};
      const arr=Object.entries(val).map(([k,v])=>({...v,_key:k})).sort((a,b)=>a.ts-b.ts);
      setMsgs(arr);
      arr.filter(m=>m.toId===myId&&!m.read).forEach(m=>
        db.ref("agms_dm/"+key+"/msgs/"+m._key+"/read").set(true)
      );
    });
    return()=>{
      const db2=getDB();
      if(db2) db2.ref("agms_dm/"+dmKey(myId,peer.id)+"/msgs").off();
    };
  },[peer,myId]);

  useEffect(()=>{endRef.current&&endRef.current.scrollIntoView({behavior:"smooth"});},[msgs]);

  const send=()=>{
    if(!text.trim()||!myId||!peer){return;}
    const db=getDB();if(!db)return;
    db.ref("agms_dm/"+dmKey(myId,peer.id)+"/msgs").push({fromId:myId,fromName:myName,toId:peer.id,toName:peer.name,text:text.trim(),ts:Date.now(),read:false});
    db.ref("agms_dm/"+dmKey(myId,peer.id)+"/meta").set({participants:[myId,peer.id],lastMsg:text.trim(),lastTs:Date.now()});
    setText("");
  };

  // Allow guests: auto-assign from localStorage
  const resolvedId=myId||(localStorage.getItem("agms_guest_name")?"g_"+(localStorage.getItem("agms_guest_name")||"").replace(/\s+/g,"_").toLowerCase():null);
  const resolvedName=myName||(localStorage.getItem("agms_guest_name")||null);
  if(!resolvedId) return null;
  const others=(online||[]).filter(u=>u.id!==resolvedId);

  return(
    <div style={{position:"fixed",bottom:18,right:14,zIndex:3000}}>
      {!open&&(
        <button onClick={()=>setOpen(true)} style={{background:pc,color:"white",border:"none",borderRadius:20,padding:"9px 16px",cursor:"pointer",fontFamily:"Oswald",fontSize:12,letterSpacing:1,boxShadow:"0 3px 16px rgba(200,16,46,.45)",display:"flex",alignItems:"center",gap:6}}>
          💬 DM {others.length>0&&(
            <span style={{background:"rgba(255,255,255,.3)",borderRadius:"50%",width:18,height:18,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}}>{others.length}</span>
          )}
        </button>
      )}
      {open&&(
        <div style={{width:"min(320px,96vw)",height:"min(460px,88vh)",background:"#1c1c1c",border:"1px solid #2e2e2e",borderRadius:"14px 14px 0 0",display:"flex",flexDirection:"column",boxShadow:"0 -6px 30px rgba(0,0,0,.7)"}}>
          {/* Header */}
          <div style={{padding:"11px 13px",borderBottom:"1px solid #242424",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#222",borderRadius:"14px 14px 0 0",flexShrink:0}}>
            {peer?(
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>{setPeer(null);setMsgs([]);}} style={{background:"none",border:"none",cursor:"pointer",color:"#888",fontSize:18,lineHeight:1}}>←</button>
                <div style={{width:28,height:28,background:pc,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>{peer.name[0].toUpperCase()}</div>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:"#e0e0e0"}}>{peer.name}</div>
                  <div style={{fontSize:10,color:"#22c55e"}}>● Online now</div>
                </div>
              </div>
            ):(
              <span style={{fontFamily:"Oswald",fontSize:13,letterSpacing:1,color:"#e0e0e0"}}>💬 Private Messages</span>
            )}
            <button onClick={()=>{setOpen(false);setPeer(null);setMsgs([]);}} style={{background:"none",border:"none",cursor:"pointer",color:"#666",fontSize:18}}>✕</button>
          </div>
          {/* Content */}
          {!peer?(
            <div style={{flex:1,overflowY:"auto",padding:8}}>
              {others.length===0?(
                <div style={{textAlign:"center",color:"#555",padding:28,fontSize:12,lineHeight:1.7}}>
                  <div style={{fontSize:32,marginBottom:8}}>👥</div>
                  No one else is online right now.<br/>Members will appear here when they join.
                </div>
              ):others.map((u,i)=>(
                <div key={i} onClick={()=>setPeer(u)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 9px",cursor:"pointer",borderRadius:9,marginBottom:3}} onMouseEnter={e=>e.currentTarget.style.background="#262626"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div style={{position:"relative",width:38,height:38,flexShrink:0}}>
                    <div style={{width:38,height:38,background:"#2e2e2e",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:700}}>{u.name[0].toUpperCase()}</div>
                    <div style={{position:"absolute",bottom:1,right:1,width:8,height:8,background:"#22c55e",borderRadius:"50%",border:"2px solid #1c1c1c"}}/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#e0e0e0"}}>{u.name}</div>
                    <div style={{fontSize:10,color:"#22c55e"}}>● Online</div>
                  </div>
                  <div style={{color:"#444",fontSize:14}}>›</div>
                </div>
              ))}
            </div>
          ):(
            <>
              <div style={{flex:1,overflowY:"auto",padding:"10px 11px",display:"flex",flexDirection:"column",gap:6}}>
                {msgs.length===0&&<div style={{textAlign:"center",color:"#555",fontSize:12,marginTop:22}}>Start the conversation! 👋</div>}
                {msgs.map(m=>{
                  const me=m.fromId===myId;
                  return(
                    <div key={m._key} style={{display:"flex",justifyContent:me?"flex-end":"flex-start"}}>
                      <div style={{maxWidth:"78%",background:me?"#8B0000":"#2a2a2a",borderRadius:me?"14px 4px 14px 14px":"4px 14px 14px 14px",padding:"8px 11px",lineHeight:1.45}}>
                        <div style={{fontSize:13,color:"white"}}>{m.text}</div>
                        <div style={{fontSize:9,color:me?"rgba(255,255,255,.4)":"#555",marginTop:3,textAlign:"right"}}>{new Date(m.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}{me&&(m.read?" ✓✓":" ✓")}</div>
                      </div>
                    </div>
                  );
                })}
                <div ref={endRef}/>
              </div>
              <div style={{padding:"8px 10px",borderTop:"1px solid #242424",display:"flex",gap:7,flexShrink:0,background:"#1c1c1c"}}>
                <input
                  value={text}
                  onChange={e=>setText(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&send()}
                  placeholder="Message..."
                  style={{flex:1,background:"#2a2a2a",border:"1px solid #333",borderRadius:18,padding:"7px 13px",color:"white",fontSize:13,outline:"none"}}
                />
                <button onClick={send} style={{background:pc,border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <Icon name="send" size={14} color="white"/>
                </button>
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
window.__hideSplash&&window.__hideSplash();</script>
</body>
</html>
